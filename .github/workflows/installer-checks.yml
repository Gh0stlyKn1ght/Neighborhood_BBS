name: Installer Script Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - "devices/**/setup.sh"
      - "server/scripts/*.sh"
      - ".github/workflows/installer-checks.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "devices/**/setup.sh"
      - "server/scripts/*.sh"
      - ".github/workflows/installer-checks.yml"

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Collect scripts
        id: scripts
        shell: bash
        run: |
          set -e
          files=$(find devices server/scripts -type f -name "*.sh" | tr '\n' ' ')
          if [ -z "$files" ]; then
            echo "No shell scripts found."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Bash syntax check
        if: steps.scripts.outputs.files != ''
        shell: bash
        run: |
          set -e
          for f in ${{ steps.scripts.outputs.files }}; do
            echo "Checking syntax: $f"
            bash -n "$f"
          done

      - name: Shellcheck lint
        if: steps.scripts.outputs.files != ''
        shell: bash
        run: shellcheck ${{ steps.scripts.outputs.files }}
