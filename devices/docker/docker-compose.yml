version: '3.8'

services:
  neighborhood-bbs:
    build:
      context: ../..
      dockerfile: devices/docker/Dockerfile
    container_name: neighborhood-bbs
    ports:
      - "127.0.0.1:8080:8080"  # Bind to localhost only for security
    volumes:
      - nbbs-data:/app/data
      - nbbs-logs:/app/logs
      - /tmp:/tmp:rw  # Temp directory if needed
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - HOST=0.0.0.0
      - PORT=8080
    restart: unless-stopped
    networks:
      - nbbs-network
    
    # Security Options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  nbbs-data:
    driver: local
  nbbs-logs:
    driver: local

networks:
  nbbs-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
