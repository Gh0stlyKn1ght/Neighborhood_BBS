version: '3.8'

# Linux/Raspberry Pi Docker Compose configuration
# Use on Raspberry Pi: docker-compose -f docker-compose.yml -f docker-compose.linux.yml up -d

services:
  neighborhood-bbs:
    build:
      context: ../..
      dockerfile: devices/docker/Dockerfile.armv7  # Use devices/docker/Dockerfile.arm64 for 64-bit Pi OS
    container_name: neighborhood-bbs
    ports:
      - "127.0.0.1:8080:8080"  # Only accessible from this machine (connect via SSH tunnel if remote)
    volumes:
      # Linux volume mounts
      - /opt/neighborhood-bbs/data:/app/data
      - /opt/neighborhood-bbs/logs:/app/logs
      - /var/run/dbus:/var/run/dbus:ro  # If using system services
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-use-strong-random-key}
      - HOST=0.0.0.0
      - PORT=8080
      - ENVIRONMENT=docker-linux
    restart: unless-stopped
    networks:
      - nbbs-network
    
    # Security Options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false  # Pi needs write access to data
    
    # Resource Limits (conservative for Pi)
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 256M
        reservations:
          cpus: '0.4'
          memory: 128M
    
    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"] || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # Logging - important on Pi to prevent disk fill
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nbbs-network:
    driver: bridge
