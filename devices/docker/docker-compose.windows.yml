version: '3.8'

# Windows-specific Docker Compose configuration
# Use: docker-compose -f docker-compose.yml -f docker-compose.windows.yml up
# Or: docker-compose --file .\docker\docker-compose.windows.yml up

services:
  neighborhood-bbs:
    build:
      context: ../..
      dockerfile: devices/docker/Dockerfile
    container_name: neighborhood-bbs
    ports:
      - "127.0.0.1:8080:8080"  # Only accessible from this machine
    volumes:
      # Windows volume mounts (use forward slashes)
      - type: bind
        source: ${NBBS_DATA_PATH:-./data}
        target: /app/data
      - type: bind
        source: ${NBBS_LOGS_PATH:-./logs}
        target: /app/logs
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-use-strong-random-key}
      - HOST=0.0.0.0
      - PORT=8080
      - ENVIRONMENT=docker
    restart: unless-stopped
    networks:
      - nbbs-network
    
    # Security Options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Resource Limits (Windows)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"] || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  nbbs-network:
    driver: bridge
