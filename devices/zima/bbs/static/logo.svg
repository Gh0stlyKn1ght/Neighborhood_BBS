<svg viewBox="0 0 560 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes scanlines {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      @keyframes blink {
        0%, 49%, 100% { opacity: 1; }
        50%, 99% { opacity: 0; }
      }
      .scanline-sweep {
        animation: scanlines 3s linear infinite;
      }
      .cursor-blink {
        animation: blink 1s step-start infinite;
      }
    </style>
    <filter id="vignette">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
    </filter>
    <pattern id="scanlinePattern" x="0" y="0" width="560" height="2" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="560" y2="0" stroke="#000" stroke-width="1" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- CRT Vignette Background -->
  <rect width="560" height="320" fill="#0a0a0a"/>
  <ellipse cx="280" cy="160" rx="290" ry="170" fill="none" stroke="#1a1a1a" stroke-width="40" opacity="0.3" filter="url(#vignette)"/>

  <!-- Outer border frame -->
  <rect x="20" y="20" width="520" height="280" fill="none" stroke="#00ff00" stroke-width="3"/>
  
  <!-- Corner brackets -->
  <g stroke="#00ff00" stroke-width="2" fill="none">
    <!-- Top-left -->
    <path d="M 25 35 L 35 25 L 50 25"/>
    <!-- Top-right -->
    <path d="M 535 35 L 525 25 L 510 25"/>
    <!-- Bottom-left -->
    <path d="M 25 285 L 35 295 L 50 295"/>
    <!-- Bottom-right -->
    <path d="M 535 285 L 525 295 L 510 295"/>
  </g>

  <!-- Inner decorative border -->
  <rect x="30" y="30" width="500" height="260" fill="none" stroke="#00ff00" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>

  <!-- Ghost figure (stylized) -->
  <g transform="translate(280, 90)">
    <!-- Ghost body -->
    <ellipse cx="0" cy="0" rx="35" ry="40" fill="#00ff00" opacity="0.9"/>
    <!-- Ghost head -->
    <circle cx="0" cy="-35" r="28" fill="#00ff00" opacity="0.9"/>
    <!-- Ghost bottom wavy -->
    <path d="M -35 40 Q -20 50 0 50 Q 20 50 35 40" fill="#00ff00" opacity="0.9"/>
    
    <!-- Eyes -->
    <circle cx="-10" cy="-40" r="5" fill="#0a0a0a"/>
    <circle cx="10" cy="-40" r="5" fill="#0a0a0a"/>
    
    <!-- Mouth -->
    <path d="M -15 -25 Q 0 -20 15 -25" stroke="#0a0a0a" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Signal waves (right side) -->
  <g transform="translate(420, 80)" stroke="#00ff00" fill="none" stroke-width="2">
    <circle cx="0" cy="0" r="5"/>
    <circle cx="0" cy="0" r="12" opacity="0.6"/>
    <circle cx="0" cy="0" r="19" opacity="0.3"/>
    <path d="M 25 -15 L 35 -5 L 45 -15 L 55 -5" stroke="#00ff00" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Status info panel -->
  <g transform="translate(50, 180)">
    <!-- Panel border -->
    <rect width="460" height="100" fill="none" stroke="#00ff00" stroke-width="2"/>
    
    <!-- Status header -->
    <text x="10" y="20" font-family="monospace" font-size="12" fill="#00ff00" font-weight="bold">
      ◆ SYSTEM STATUS
    </text>
    
    <!-- Status lines -->
    <text x="10" y="40" font-family="monospace" font-size="11" fill="#00ff00" letter-spacing="1">
      BBS: ONLINE    MODE: NEIGHBORHOOD    BAND: 2.4GHZ
    </text>
    <text x="10" y="58" font-family="monospace" font-size="11" fill="#00ff00" letter-spacing="1">
      RANGE: 50-80M   CLIENTS: WELCOME    ENCRYPTION: SSH
    </text>
    <text x="10" y="76" font-family="monospace" font-size="11" fill="#00ff00" letter-spacing="1">
      UPTIME: ∞    TX_POWER: MAX    BUFFER: 50 MSGS
    </text>
    
    <!-- Blinking cursor at end -->
    <g class="cursor-blink">
      <rect x="445" y="66" width="8" height="12" fill="#00ff00" opacity="0.7"/>
    </g>
  </g>

  <!-- Subtext -->
  <text x="280" y="310" font-family="monospace" font-size="11" fill="#00ff00" text-anchor="middle" opacity="0.7">
    BULLETIN BOARD SYSTEM ◆ LOCAL NEIGHBORHOOD NETWORK ◆ EST. 2026
  </text>

  <!-- Static scanline overlay -->
  <rect width="560" height="320" fill="url(#scanlinePattern)" pointer-events="none"/>
  
  <!-- Animated scanline sweep -->
  <g class="scanline-sweep" pointer-events="none">
    <rect x="0" y="0" width="560" height="3" fill="#00ff00" opacity="0.05"/>
  </g>
</svg>