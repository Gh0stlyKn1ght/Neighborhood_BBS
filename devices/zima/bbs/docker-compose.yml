version: '3.8'

services:
  neighborhood-bbs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neighborhood-bbs
    ports:
      - "5000:5000"
      - "80:5000"  # Optional: expose on port 80 via nginx
    volumes:
      - bbs-data:/app/data
    environment:
      FLASK_ENV: production
      ADMIN_PASSWORD: gh0stly
      LISTEN_PORT: 5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bbs-data:
    driver: local

networks:
  default:
    name: neighborhood-bbs-network
    driver: bridge
