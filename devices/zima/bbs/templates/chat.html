{% extends "base.html" %}

{% block title %}Chat Room - Neighborhood BBS{% endblock %}

{% block extra_css %}
<style>
    .titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding: 10px;
        border: 1px solid #00ff00;
        background: rgba(0, 255, 0, 0.05);
    }
    
    .titlebar button {
        padding: 6px 12px;
        font-size: 12px;
    }
    
    .chat-container {
        display: flex;
        height: 60vh;
        border: 2px solid #00ff00;
        background: #000;
        margin: 15px 0;
    }
    
    .chat-tabs {
        display: flex;
        border-bottom: 1px solid #00ff00;
        margin-bottom: 10px;
    }
    
    .tab {
        flex: 1;
        padding: 10px;
        border: 1px solid #00ff00;
        margin-right: 5px;
        cursor: pointer;
        background: rgba(0, 255, 0, 0.05);
        text-align: center;
        font-weight: bold;
    }
    
    .tab.active {
        background: #00ff00;
        color: #000;
    }
    
    .chat-pane {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        font-size: 12px;
    }
    
    .chat-pane.active {
        display: block;
    }
    
    .message {
        margin: 5px 0;
        padding: 5px;
        line-height: 1.4;
    }
    
    .message-system {
        color: #ffff00;
        font-style: italic;
    }
    
    .message-handle {
        color: #00ff00;
        font-weight: bold;
    }
    
    .message-text {
        color: #00ff00;
        margin-left: 5px;
    }
    
    .input-area {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 15px;
        border-top: 1px solid #00ff00;
        background: rgba(0, 255, 0, 0.02);
    }
    
    .nick-row {
        display: flex;
        gap: 5px;
    }
    
    .nick-row input {
        flex: 1;
        margin: 0;
    }
    
    .nick-row button {
        margin: 0;
        padding: 8px 16px;
    }
    
    .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff0000;
        margin-left: 10px;
    }
    
    .status-dot.connected {
        background: #00ff00;
    }
    
    .input-row {
        display: flex;
        gap: 5px;
    }
    
    .input-row textarea {
        flex: 1;
        margin: 0;
        resize: none;
        height: 60px;
    }
    
    .input-row button {
        align-self: flex-end;
        margin: 0;
        padding: 8px 16px;
    }
    
    .char-counter {
        font-size: 11px;
        opacity: 0.7;
        text-align: right;
    }
    
    .unread-badge {
        background: #ff0000;
        color: #fff;
        font-size: 10px;
        padding: 2px 6px;
        margin-left: 5px;
        border-radius: 3px;
    }
</style>
{% endblock %}

{% block content %}
<div class="titlebar">
    <h1 style="margin: 0; font-size: 16px;">◆ CHAT ROOM</h1>
    <button onclick="location.href='/'">← BACK</button>
</div>

<div class="titlebar">
    <div style="flex: 1;">
        <span id="nick-display" style="font-weight: bold;">ANON_000</span>
        <span id="status-dot" class="status-dot"></span>
    </div>
    <div style="font-size: 12px; opacity: 0.7;">Connected clients online</div>
</div>

<div class="chat-container">
    <div class="chat-pane active" id="chat-pane" style="flex: 1; border-right: 1px solid #00ff00;">
        <div id="messages" style="height: 100%; overflow-y: auto;"></div>
    </div>
</div>

<div class="input-area">
    <div class="nick-row">
        <input type="text" id="nick-input" placeholder="Your handle (alphanumeric + _ -)" maxlength="16" autocomplete="off">
        <button onclick="setNick()">SET</button>
    </div>
    
    <div class="input-row">
        <textarea id="msg-input" placeholder="Message (120 max)..." maxlength="120"></textarea>
        <button onclick="sendMsg()">SEND</button>
    </div>
    
    <div class="char-counter">
        <span id="char-count">0</span>/120
    </div>
</div>

<script>
    const MAX_CHARS = 120;
    let ws = null;
    let nick = 'ANON_000';
    let connected = false;

    // Update character count
    document.getElementById('msg-input').addEventListener('input', (e) => {
        document.getElementById('char-count').textContent = e.target.value.length;
    });

    // Send on Enter key
    document.getElementById('msg-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
            sendMsg();
        }
    });

    // Set nick on Enter
    document.getElementById('nick-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            setNick();
        }
    });

    function connectWS() {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = proto + '//' + window.location.host + '/ws';
        
        ws = new WebSocket(url);
        
        ws.onopen = () => {
            console.log('WebSocket connected');
            setConnected(true);
            // Send initial nick
            ws.send(JSON.stringify({ type: 'nick_set', nick: nick }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'history') {
                // Clear and load history
                document.getElementById('messages').innerHTML = '';
                data.messages.forEach(msg => addMessage(msg));
            } else if (data.type === 'msg') {
                addMessage(data);
            } else if (data.type === 'nick_ok') {
                nick = data.nick;
                document.getElementById('nick-display').textContent = nick;
            } else if (data.type === 'error') {
                alert('Error: ' + data.text);
            }
        };
        
        ws.onclose = () => {
            console.log('WebSocket closed');
            setConnected(false);
            // Reconnect after 3 seconds
            setTimeout(connectWS, 3000);
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            setConnected(false);
        };
    }

    function setConnected(isConnected) {
        connected = isConnected;
        const dot = document.getElementById('status-dot');
        if (isConnected) {
            dot.classList.add('connected');
        } else {
            dot.classList.remove('connected');
        }
    }

    function setNick() {
        const input = document.getElementById('nick-input');
        const newNick = input.value.trim() || 'ANON_000';
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'nick_set', nick: newNick }));
        }
        
        input.value = '';
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        
        if (!text) return;
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'msg', text: text }));
            input.value = '';
            document.getElementById('char-count').textContent = '0';
        } else {
            alert('Not connected to chat server');
        }
    }

    function addMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const msgEl = document.createElement('div');
        msgEl.className = 'message' + (msg.system ? ' message-system' : '');
        
        if (msg.system) {
            msgEl.innerHTML = `<i>${msg.text}</i>`;
        } else {
            msgEl.innerHTML = `<span class="message-handle">${msg.handle}:</span><span class="message-text">${escapeHtml(msg.text)}</span>`;
        }
        
        messagesDiv.appendChild(msgEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Connect on load
    connectWS();
</script>
{% endblock %}
