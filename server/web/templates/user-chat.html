<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NEIGHBORHOOD BBS - User Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --g: #00ff41;
            --dark: #000000;
            --dim: #007a1e;
            --bright: #00ff41;
            --text: #00ff41;
            --error: #ff4141;
            --accent: #00aaff;
        }

        html, body {
            background: var(--dark);
            color: var(--g);
            font-family: 'Courier Prime', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            height: 100%;
            overflow: hidden;
        }

        /* CRT Monitor Effects */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15) 0, rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 9999;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 9998;
        }

        .terminal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .header {
            border-bottom: 2px solid var(--g);
            padding: 10px 15px;
            background: rgba(0, 255, 65, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            height: 30px;
            width: auto;
            filter: drop-shadow(0 0 5px rgba(0, 255, 65, 0.5));
        }

        .header-title {
            color: var(--g);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }

        .current-user {
            color: var(--accent);
            text-shadow: 0 0 3px rgba(0, 170, 255, 0.5);
            font-size: 11px;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 11px;
            color: var(--dim);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--g);
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--dim);
            padding: 4px 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--g);
            color: var(--g);
            text-shadow: 0 0 3px rgba(0, 255, 65, 0.5);
        }

        .main-content {
            flex: 1;
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            min-height: 0;
        }

        .sidebar {
            width: 150px;
            border: 1px solid var(--dim);
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-height: 0;
        }

        .sidebar-section {
            padding: 10px;
            border-bottom: 1px solid var(--dim);
        }

        .sidebar-title {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 3px rgba(0, 170, 255, 0.3);
        }

        .room-item {
            color: var(--dim);
            padding: 4px 0;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .room-item:hover {
            color: var(--g);
            text-shadow: 0 0 3px rgba(0, 255, 65, 0.5);
        }

        .room-item.active {
            color: var(--g);
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.8);
            border-left: 3px solid var(--g);
            padding-left: 4px;
        }

        .chat-area {
            flex: 1;
            border: 1px solid var(--dim);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            min-width: 0;
            overflow: hidden;
        }

        .chat-header {
            border-bottom: 1px solid var(--dim);
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .chat-title {
            color: var(--g);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .chat-topic {
            color: var(--dim);
            font-size: 10px;
        }

        .chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            min-height: 0;
            font-size: 11px;
        }

        .message {
            margin-bottom: 6px;
            padding: 4px;
            border-left: 2px solid transparent;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .message.own {
            border-left-color: var(--accent);
            background: rgba(0, 170, 255, 0.05);
        }

        .message.other {
            border-left-color: var(--g);
        }

        .message-time {
            color: var(--dim);
            font-size: 10px;
            margin-right: 8px;
        }

        .message-author {
            color: var(--accent);
            font-weight: bold;
            margin-right: 8px;
        }

        .message-author.own {
            color: var(--g);
        }

        .message-text {
            color: var(--g);
            word-wrap: break-word;
        }

        .system-message {
            color: var(--dim);
            font-style: italic;
            text-align: center;
            padding: 6px;
        }

        .chat-input-area {
            border-top: 1px solid var(--dim);
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
        }

        .input-label {
            color: var(--dim);
            font-size: 10px;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
        }

        .message-input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--g);
            padding: 6px 8px;
            font-family: inherit;
            font-size: 11px;
            outline: none;
            transition: all 0.2s;
            text-shadow: 0 0 3px rgba(0, 255, 65, 0.5);
            caret-color: var(--g);
            resize: none;
            max-height: 60px;
        }

        .message-input:focus {
            border-color: var(--g);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            background: rgba(0, 255, 65, 0.05);
        }

        .message-input::placeholder {
            color: var(--dim);
        }

        .send-btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--dim);
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            transition: all 0.2s;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .send-btn:hover {
            border-color: var(--g);
            color: var(--g);
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .char-count {
            color: var(--dim);
            font-size: 10px;
            text-align: right;
            margin-top: 4px;
        }

        .footer {
            border-top: 1px solid var(--dim);
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--dim);
        }

        .footer-info {
            display: flex;
            gap: 15px;
        }

        .error-banner {
            background: rgba(255, 65, 65, 0.1);
            border: 1px solid var(--error);
            border-radius: 2px;
            color: var(--error);
            padding: 8px 10px;
            margin-bottom: 8px;
            font-size: 11px;
            display: none;
        }

        .error-banner.show {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dim);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--g);
            box-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            font-size: 10px;
        }

        .user-item {
            color: var(--dim);
            padding: 3px 0;
            transition: all 0.2s;
        }

        .user-item:hover {
            color: var(--g);
        }

        .user-item::before {
            content: '◆ ';
            color: var(--accent);
            margin-right: 2px;
        }
    </style>
</head>
<body>

<div class="terminal">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <img src="/static/images/logo.png" alt="Logo" class="header-logo" />
            <div class="header-title">>> NEIGHBORHOOD BBS - USER CHAT <<<</div>
        </div>
        <div style="flex: 1;"></div>
        <div class="header-right">
            <span><span class="status-indicator"></span> CONNECTED</span>
            <span class="current-user">User: <span id="username-display"></span></span>
            <button class="logout-btn" onclick="handleLogout()">[ LOGOUT ]</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">📡 Rooms</div>
                <div id="room-list"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">👥 Users Online</div>
                <div class="user-list" id="user-list"></div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title" id="room-title">Loading...</div>
                <div class="chat-topic" id="room-description"></div>
            </div>

            <div class="error-banner" id="error-banner"></div>

            <div class="chat-log" id="chat-log"></div>

            <div class="chat-input-area">
                <div class="input-group">
                    <div class="input-wrapper" style="flex: 1;">
                        <label class="input-label">Message</label>
                        <textarea class="message-input" id="message-input" placeholder="Type your message here..." rows="1"></textarea>
                        <div class="char-count"><span id="char-count">0</span>/5000</div>
                    </div>
                    <button class="send-btn" onclick="sendMessage()" id="send-btn">[ SEND ]</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-info">
            <span>Room: <span id="current-room">--</span></span>
            <span>Users: <span id="online-count">0</span></span>
            <span>Ping: <span id="ping-time">--ms</span></span>
        </div>
        <div id="status-message">Ready</div>
    </div>
</div>

<script>
const API_URL = '/api/chat';
const USER_API = '/api/user';

let authToken = localStorage.getItem('auth_token');
let username = localStorage.getItem('username');
let currentRoomId = 1;
let messageRefreshInterval;

// Redirect to login if not authenticated
if (!authToken) {
    window.location.href = '/user-login.html';
}

document.getElementById('username-display').textContent = username;

function showError(message) {
    const banner = document.getElementById('error-banner');
    banner.textContent = message;
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 5000);
}

function updateCharCount() {
    const input = document.getElementById('message-input');
    const count = input.value.length;
    document.getElementById('char-count').textContent = count;
}

async function loadRooms() {
    try {
        const response = await fetch(`${API_URL}/rooms`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
            const data = await response.json();
            const roomList = document.getElementById('room-list');
            roomList.innerHTML = '';

            data.rooms.forEach(room => {
                const item = document.createElement('div');
                item.className = `room-item ${room.id === currentRoomId ? 'active' : ''}`;
                item.textContent = room.name;
                item.onclick = () => switchRoom(room.id, room.name, room.description);
                roomList.appendChild(item);
            });

            // Load first room by default
            if (data.rooms.length > 0) {
                switchRoom(data.rooms[0].id, data.rooms[0].name, data.rooms[0].description);
            }
        }
    } catch (error) {
        console.error('Error loading rooms:', error);
        showError('Failed to load chat rooms');
    }
}

function switchRoom(roomId, name, description) {
    currentRoomId = roomId;
    document.getElementById('room-title').textContent = `#${name}`;
    document.getElementById('room-description').textContent = description || 'Community chat';
    document.getElementById('current-room').textContent = name;

    // Update active room highlight
    document.querySelectorAll('.room-item').forEach(item => {
        item.classList.remove('active');
    });
    event.target?.classList.add('active');

    // Clear chat and load messages
    document.getElementById('chat-log').innerHTML = '';
    loadMessages();
}

async function loadMessages() {
    try {
        const response = await fetch(`${API_URL}/rooms/${currentRoomId}/messages-auth?limit=50`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
            const data = await response.json();
            const chatLog = document.getElementById('chat-log');
            chatLog.innerHTML = '';

            data.messages.reverse().forEach(msg => {
                const isOwn = msg.author === username;
                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'own' : 'other'}`;
                div.innerHTML = `
                    <span class="message-time">[${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}]</span>
                    <span class="message-author ${isOwn ? 'own' : ''}">${msg.author}</span>
                    <span class="message-text">${escapeHtml(msg.text)}</span>
                `;
                chatLog.appendChild(div);
            });

            chatLog.scrollTop = chatLog.scrollHeight;
        }
    } catch (error) {
        console.error('Error loading messages:', error);
        showError('Failed to load messages');
    }
}

async function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    const btn = document.getElementById('send-btn');

    if (!text) {
        return;
    }

    if (text.length > 5000) {
        showError('Message too long (max 5000 characters)');
        return;
    }

    btn.disabled = true;

    try {
        const response = await fetch(`${API_URL}/send-message-auth`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`
            },
            body: JSON.stringify({
                room_id: currentRoomId,
                text: text
            })
        });

        if (response.ok) {
            input.value = '';
            updateCharCount();
            loadMessages();
        } else {
            const data = await response.json();
            showError(data.error || 'Failed to send message');
        }
    } catch (error) {
        console.error('Error sending message:', error);
        showError('Connection error');
    } finally {
        btn.disabled = false;
    }
}

async function loadOnlineUsers() {
    try {
        const response = await fetch(`${API_URL}/rooms/${currentRoomId}/users`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
            const data = await response.json();
            const userList = document.getElementById('user-list');
            userList.innerHTML = '';
            document.getElementById('online-count').textContent = data.count;

            data.users.forEach(user => {
                const item = document.createElement('div');
                item.className = 'user-item';
                item.textContent = user;
                userList.appendChild(item);
            });
        }
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

function handleLogout() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('username');
        localStorage.removeItem('user_id');
        window.location.href = '/user-login.html';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Initialize
loadRooms();
setInterval(loadMessages, 3000);  // Refresh messages every 3 seconds
setInterval(loadOnlineUsers, 5000);  // Refresh users every 5 seconds

// Event listeners
document.getElementById('message-input').addEventListener('input', updateCharCount);
document.getElementById('message-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// Ping status
setInterval(() => {
    const start = Date.now();
    fetch(`${API_URL}/rooms`, { headers: { 'Authorization': `Bearer ${authToken}` } })
        .then(() => {
            const ping = Date.now() - start;
            document.getElementById('ping-time').textContent = ping + 'ms';
        })
        .catch(() => {
            document.getElementById('ping-time').textContent = '---ms';
        });
}, 10000);
</script>

</body>
</html>
