[pytest]
# Only discover tests in server/tests/ directory
testpaths = server/tests
# Don't look for tests in src directory
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Add src to Python path for imports
pythonpath = server/src
# Exclude tests from src directory
norecursedirs = server/src
# Ignore specific test patterns
addopts = --ignore=server/src
